versions:
  - version: "v0.8.0"
    status: released
    title: "Stable CLI Foundation"
    theme: "BM25 full-text index, background agent, path & extension filters."
    doc_url: "https://github.com/eltu/idx/blob/main/docs/releases/v0.8.0.md"
    features:
      - icon: "🔎"
        label: "BM25 full-text index"
      - icon: "⚙️"
        label: "Background agent process"
      - icon: "🎯"
        label: "Path & extension filters"

  - version: "v0.9.0"
    status: released
    title: "AI Integration Layer"
    theme: "Close the gap between what the CLI offers and what agents actually use."
    date: "June 26, 2026"
    doc_url: "https://github.com/eltu/idx/blob/main/docs/releases/v0.9.0.md"
    features:
      - icon: "📖"
        label: "<code>idx read --compact</code>"
        description: "Canonical raw-content reader for agent pipelines — every read now routes through idx."
      - icon: "🛡️"
        label: "Project-level enforcement hooks"
        description: "Blocks grep/cat bypass attempts at the Bash layer and re-injects the rules every turn."
      - icon: "🧹"
        label: "<code>make skill-lint</code>"
        description: "CI fails automatically the moment the skill docs drift from the live CLI."
      - icon: "🏷️"
        label: "Skill renamed <code>idx-search</code> → <code>idx</code>"
        description: "Matches the CLI binary name across Claude, Cursor, and Copilot."

  - version: "v0.10.0"
    status: released
    title: "Git-aware Primitives"
    theme: "Make idx conscious of what the developer is actively working on."
    date: "June 30, 2026"
    doc_url: "https://github.com/eltu/idx/blob/main/docs/releases/v0.10.0.md"
    features:
      - icon: "🔗"
        label: "<code>idx related &lt;file&gt;</code>"
        description: "Ranks neighbors by git co-change (0.5), persistent co-read (0.3), and term overlap (0.2)."
      - icon: "⎇"
        label: "<code>idx search --since &lt;ref&gt;</code>"
        description: "Scope any search to files changed since a commit, branch, or tag."
      - icon: "🔒"
        label: "Four enforcement hooks"
        description: "Now also blocks Claude's built-in Read and Grep tools, not just the Bash shell."
      - icon: "📊"
        label: "<code>popularity_weight</code> configurable"
        description: "Exposed via <code>idx config get/show</code> alongside the other 13 keys."

  - version: "v0.11.0"
    status: next
    title: "Agent-optimized Output"
    theme: "Return structured, precise, context-budget-aware results instead of file paths."
    doc_url: "https://github.com/eltu/idx/blob/main/docs/roadmap/v0.11.0.md"
    features:
      - icon: "🌳"
        label: "Symbol-aware search"
        description: "tree-sitter index separates function definitions from call sites; ranks declarations first."
      - icon: "✂️"
        label: "<code>--chunk</code>"
        description: "Return the enclosing function or struct body instead of a raw file path."
      - icon: "🎯"
        label: "<code>idx context --budget N</code>"
        description: "Assemble a token-bounded context package ready for direct injection."

  - version: "v1.0.0"
    status: milestone
    title: "Multi-agent: Worktree Isolation & Hybrid MCP Search"
    theme: "Enable parallel agents on the same repository without index collisions, at any codebase scale."
    doc_url: "https://github.com/eltu/idx/blob/main/docs/roadmap/v1.0.0.md"
    note: "The branch delta index and the remote MCP baseline share the same git-diff primitive — the local index stays small regardless of monorepo size."
    features:
      - icon: "🗂️"
        label: "Worktree-native isolation"
        description: "Each Git worktree gets its own independent index, agent process, and socket."
      - icon: "☁️"
        label: "Hybrid MCP search"
        description: "Local working-set index fans out to a remote baseline; local changes always shadow remote results."
      - icon: "📋"
        label: "<code>idx worktree list</code>"
        description: "Single command to inspect agent health across every active branch."

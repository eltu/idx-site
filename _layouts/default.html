<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — idx{% else %}idx docs{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}idx — fast BM25 code search for Git repositories{% endif %}">
  <link rel="stylesheet" href="/assets/css/fonts.css">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  {% include header.html %}

  <div class="docs-shell">
    {% include sidebar.html %}

    <main class="docs-content">
      <article class="docs-body">
        {{ content }}
      </article>
    </main>
  </div>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="/">Home</a>
      <a href="/features/search">Docs</a>
      <a href="https://github.com/eltu/idx" target="_blank" rel="noopener">GitHub</a>
      <a href="https://github.com/eltu/idx/blob/main/LICENSE" target="_blank" rel="noopener">License</a>
    </div>
    <p>idx — fast BM25 code search for Git repositories</p>
  </footer>

  <script src="/assets/js/main.js"></script>
</body>
</html>
